services:
  # =========================================================================
  # IB Gateway — community image that runs Interactive Brokers Gateway
  # headlessly. Your IBKR credentials are passed via environment variables
  # and stay inside this container; they are NEVER sent to the backend.
  # =========================================================================
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: cautiouswetfloor-ib-gateway
    restart: unless-stopped
    environment:
      TWS_USERID: ${IBKR_USERNAME}
      TWS_PASSWORD: ${IBKR_PASSWORD}
      TRADING_MODE: ${TRADING_MODE:-paper}
      READ_ONLY_API: ${READ_ONLY_API:-yes}
      TWS_ACCEPT_INCOMING: accept
      TIME_ZONE: America/New_York
      AUTO_RESTART_TIME: "23:55"
      # 2FA-friendly settings (works with IBKR Mobile push notifications)
      RELOGIN_AFTER_2FA_TIMEOUT: "yes"
      TWOFA_TIMEOUT_ACTION: restart
      EXISTING_SESSION_DETECTED_ACTION: primary
    ports:
      # Inside the container Gateway binds API to 127.0.0.1:4002 (paper) / 4001
      # (live) — localhost-only. socat re-exposes them on 0.0.0.0:4004 / 4003
      # so other containers (and the host) can actually connect.
      - "4004:4004"   # Paper API (via socat)
      - "4003:4003"   # Live API (via socat)
      - "5900:5900"   # VNC for debugging Gateway's UI; password = TWS_PASSWORD
    networks:
      - cautiouswetfloor-net
    healthcheck:
      # The gnzsnz image doesn't ship `nc` or `netstat`. We grep /proc/net/tcp
      # (always available on Linux) for any listening socket on the socat
      # ports: 0FA4 = 4004 (paper), 0FA3 = 4003 (live). State 0A = LISTEN.
      test:
        - CMD-SHELL
        - 'grep " 0A " /proc/net/tcp /proc/net/tcp6 2>/dev/null | grep -qE ":(0FA3|0FA4)"'
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  # =========================================================================
  # Backend — FastAPI service. Holds a lazy-connected ib_async.IB singleton
  # and serves the dashboard API. clientId=2 to avoid clashing with the POC
  # (which uses clientId=1).
  # =========================================================================
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: cautiouswetfloor-backend
    depends_on:
      ib-gateway:
        condition: service_started
    environment:
      IB_GATEWAY_HOST: ib-gateway
      IB_GATEWAY_PORT: ${IB_GATEWAY_PORT:-4004}
      IB_CLIENT_ID: 2
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    networks:
      - cautiouswetfloor-net

  # =========================================================================
  # Frontend — Next.js (App Router). Server-renders the dashboard by fetching
  # from the backend over the docker network.
  # =========================================================================
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: cautiouswetfloor-frontend
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    networks:
      - cautiouswetfloor-net

  # =========================================================================
  # Backend POC — Phase 0 de-risk script, kept as a regression harness.
  # Overrides the Dockerfile's default CMD (which now runs uvicorn) to run
  # the POC script. Uses clientId=1 (backend uses 2 to avoid clashing).
  #
  # Run on demand:
  #     ./scripts/compose.sh up backend-poc
  #
  # Not started by default; the `profiles: [poc]` opt-out gate keeps it out
  # of `docker compose up`.
  # =========================================================================
  backend-poc:
    profiles: [poc]
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: cautiouswetfloor-backend-poc
    depends_on:
      ib-gateway:
        condition: service_started
    environment:
      IB_GATEWAY_HOST: ib-gateway
      IB_GATEWAY_PORT: ${IB_GATEWAY_PORT:-4004}
      IB_CLIENT_ID: 1
    networks:
      - cautiouswetfloor-net
    command: python -m poc.connect_ibkr

networks:
  cautiouswetfloor-net:
    driver: bridge
